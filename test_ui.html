<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LangGraph AI Blog Generator</title>

<style>
body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:#f4f7f6;
    color:#333;
    max-width:800px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
    color:#2c3e50;
}

.card{
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 4px 6px rgba(0,0,0,0.1);
    margin-bottom:20px;
}

.input-group{
    display:flex;
    gap:10px;
}

input[type="text"]{
    flex:1;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:16px;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
    font-weight:bold;
}

.btn-primary{background:#3498db;color:white;}
.btn-success{background:#2ecc71;color:white;}
.btn-danger{background:#e74c3c;color:white;}

.hidden{display:none;}

.loader{
    border:4px solid #f3f3f3;
    border-top:4px solid #3498db;
    border-radius:50%;
    width:24px;
    height:24px;
    animation:spin 1s linear infinite;
    margin-right:10px;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

.loading-text{
display:flex;
align-items:center;
color:#f39c12;
font-weight:bold;
margin-bottom:15px;
}

pre{
background:#2c3e50;
color:#ecf0f1;
padding:15px;
border-radius:5px;
white-space:pre-wrap;
}
</style>
</head>

<body>

<h1>📝 AI Blog Architect</h1>
<div id="connectionStatus">🟡 Connecting...</div>

<div class="card">

<h3>1. What should we write about?</h3>

<div class="input-group">
<input type="text" id="topicInput" placeholder="e.g. LangGraph architecture explained">
<button class="btn-primary" onclick="startBlog()">Generate Plan</button>
</div>

</div>


<div class="card hidden" id="planCard">

<h3>2. Review Plan</h3>

<div id="planLoading" class="loading-text hidden">
<div class="loader"></div>
<span>Generating plan...</span>
</div>

<div id="planContent" class="hidden">

<ul id="taskList"></ul>

<div style="margin-top:20px;display:flex;gap:10px">
<button class="btn-success" onclick="approvePlan()" id="approveBtn">Approve</button>
<button class="btn-danger" onclick="declinePlan()" id="declineBtn">Decline</button>
</div>

</div>

</div>


<div class="card hidden" id="blogCard">

<h3>3. Blog Generation</h3>

<div id="blogLoading" class="loading-text hidden">
<div class="loader"></div>
<span>Workers writing sections in parallel...</span>
</div>

<div id="blogContent" class="hidden">

<h4>Section Progress</h4>
<ul id="sectionProgress"></ul>

<h4 style="margin-top:20px">Final Blog</h4>
<pre id="finalMarkdown"></pre>

</div>

</div>


<script>

let ws;

const uiState = {
topic:null,
tasks:[],
sectionsCompleted:{},
finalBlog:null
};

const eventHandlers = {
plan_ready:handlePlanReady,
section_complete:handleSectionComplete,
completed:handleCompleted
};


function connectWebSocket(){

ws = new WebSocket("ws://127.0.0.1:8000/api/v1/ws/243274g24024842j");

ws.onopen = () => {

const el=document.getElementById("connectionStatus");
el.innerText="🟢 Connected";
el.style.color="green";

};

ws.onclose = () => {

const el=document.getElementById("connectionStatus");
el.innerText="🔴 Disconnected";
el.style.color="red";

};

ws.onmessage=(event)=>{

const data=JSON.parse(event.data);
const type=data.status || data.action;

const handler=eventHandlers[type];

if(handler){
handler(data);
}

};

}

connectWebSocket();



function handlePlanReady(data){

document.getElementById("planLoading").classList.add("hidden");
document.getElementById("planContent").classList.remove("hidden");

const taskList=document.getElementById("taskList");
const progress=document.getElementById("sectionProgress");

taskList.innerHTML="";
progress.innerHTML="";

uiState.tasks=[];
uiState.sectionsCompleted={};

if(data.plan && data.plan.tasks){

data.plan.tasks.forEach(task=>{

uiState.tasks.push(task.id);

const li=document.createElement("li");
li.innerHTML=`<strong>Task ${task.id}</strong>: ${task.title}`;
taskList.appendChild(li);

const p=document.createElement("li");
p.id=`section-${task.id}`;
p.innerText=`⏳ Section ${task.id} writing`;
progress.appendChild(p);

});

}

}



function handleSectionComplete(data){

const id=data.task_id;

uiState.sectionsCompleted[id]=true;

const element=document.getElementById(`section-${id}`);

if(element){
element.innerText=`✅ Section ${id} completed`;
}

}



function handleCompleted(data){

document.getElementById("blogLoading").classList.add("hidden");

const text=data.blog || data.final || "No blog returned";

uiState.finalBlog=text;

document.getElementById("finalMarkdown").innerText=text;

document.getElementById("blogContent").classList.remove("hidden");

}



function startBlog(){

const topic=document.getElementById("topicInput").value;

if(!topic){
alert("Enter topic");
return;
}

uiState.topic=topic;

document.getElementById("planCard").classList.remove("hidden");

document.getElementById("planContent").classList.add("hidden");

document.getElementById("planLoading").classList.remove("hidden");

document.getElementById("blogCard").classList.add("hidden");

ws.send(JSON.stringify({action:"start",topic}));

}



function declinePlan(){

document.getElementById("approveBtn").disabled=true;
document.getElementById("declineBtn").disabled=true;

document.getElementById("planContent").classList.add("hidden");
document.getElementById("planLoading").classList.remove("hidden");

ws.send(JSON.stringify({action:"decline"}));

}



function approvePlan(){

document.getElementById("approveBtn").disabled=true;
document.getElementById("declineBtn").disabled=true;

document.getElementById("blogCard").classList.remove("hidden");

document.getElementById("blogContent").classList.add("hidden");

document.getElementById("blogLoading").classList.remove("hidden");

document.getElementById("blogCard").scrollIntoView({behavior:"smooth"});

ws.send(JSON.stringify({action:"approve"}));

}

</script>

</body>
</html>
