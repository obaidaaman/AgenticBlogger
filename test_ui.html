<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LangGraph AI Blog Generator</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 { text-align: center; color: #2c3e50; }
        .card {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .input-group { display: flex; gap: 10px; }
        input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }
        .btn-primary { background: #3498db; color: white; }
        .btn-primary:hover { background: #2980b9; }
        .btn-success { background: #2ecc71; color: white; }
        .btn-success:hover { background: #27ae60; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-danger:hover { background: #c0392b; }
        
        #connectionStatus { text-align: center; font-size: 14px; margin-bottom: 20px; color: #7f8c8d; }
        
        .hidden { display: none; }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .loading-text { display: flex; align-items: center; color: #f39c12; font-weight: bold; margin-bottom: 15px; }
        
        ul.task-list { padding-left: 20px; }
        ul.task-list li { margin-bottom: 8px; font-size: 15px; }
        
        pre {
            background: #2c3e50;
            color: #ecf0f1;
            padding: 15px;
            border-radius: 5px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
    </style>
</head>
<body>

    <h1>📝 AI Blog Architect</h1>
    <div id="connectionStatus">🟡 Connecting to WebSocket...</div>

    <!-- STEP 1: TOPIC INPUT -->
    <div class="card">
        <h3>1. What should we write about?</h3>
        <div class="input-group">
            <input type="text" id="topicInput" placeholder="e.g., The Future of Quantum Computing">
            <button class="btn-primary" onclick="startBlog()" id="startBtn">Generate Plan</button>
        </div>
    </div>

    <!-- STEP 2: HUMAN REVIEW -->
    <div class="card hidden" id="planCard">
        <h3>2. Review the Generated Plan</h3>
        <div id="planLoading" class="loading-text hidden">
            <div class="loader"></div> <span id="planLoadingText">AI is thinking...</span>
        </div>
        
        <div id="planContent" class="hidden">
            <p><strong>Tasks mapped out by the Orchestrator:</strong></p>
            <ul class="task-list" id="taskList"></ul>
            
            <div style="margin-top: 20px; display: flex; gap: 10px;">
                <button class="btn-success" onclick="approvePlan()" id="approveBtn">✅ Approve & Write Blog</button>
                <button class="btn-danger" onclick="declinePlan()" id="declineBtn">❌ Decline (Try Again)</button>
            </div>
        </div>
    </div>

    <!-- STEP 3: FINAL OUTPUT -->
    <div class="card hidden" id="blogCard">
        <h3>3. Final Generated Blog</h3>
        <div id="blogLoading" class="loading-text hidden">
            <div class="loader"></div> <span>Parallel workers are writing and generating images... Please wait!</span>
        </div>
        
        <div id="blogContent" class="hidden">
            <pre id="finalMarkdown"></pre>
        </div>
    </div>

    <script>
        // 1. Initialize WebSocket Connection
        let ws;
        const connectWebSocket = () => {
            ws = new WebSocket("ws://127.0.0.1:8000/api/v1/ws/243274g24024842j");

            ws.onopen = () => {
                document.getElementById("connectionStatus").innerText = "🟢 Connected to Backend Engine";
                document.getElementById("connectionStatus").style.color = "#27ae60";
            };

            ws.onclose = () => {
                document.getElementById("connectionStatus").innerText = "🔴 Disconnected. Refresh to reconnect.";
                document.getElementById("connectionStatus").style.color = "#e74c3c";
            };

            ws.onmessage = (event) => {
                const response = JSON.parse(event.data);
                const actionType = response.action || response.status; // Support both just in case

                // ==========================================
                // EVENT: PLAN READY
                // ==========================================
                if (actionType === "plan_ready") {
                    // Hide loading indicator
                    document.getElementById("planLoading").classList.add("hidden");
                    
                    // Clear out old tasks
                    const taskList = document.getElementById("taskList");
                    taskList.innerHTML = "";

                    // Parse the Pydantic Plan (which contains an array of tasks)
                    if (response.plan && response.plan.tasks) {
                        response.plan.tasks.forEach(task => {
                            let li = document.createElement("li");
                            li.innerHTML = `<strong>Task ${task.id}:</strong> ${task.description || task.title}`;
                            taskList.appendChild(li);
                        });
                    } else {
                        taskList.innerHTML = "<li>No tasks found. Backend returned an empty plan.</li>";
                    }

                    // Show the plan content and buttons
                    document.getElementById("planContent").classList.remove("hidden");
                    
                    // Reset buttons
                    document.getElementById("approveBtn").disabled = false;
                    document.getElementById("declineBtn").disabled = false;
                }

                // ==========================================
                // EVENT: COMPLETED (Final Blog)
                // ==========================================
                if (actionType === "completed") {
                    // Hide loading
                    document.getElementById("blogLoading").classList.add("hidden");
                    
                    // Display final markdown text
                    // Handles both 'final' or 'blog' depending on what your backend sent
                    const text = response.final || response.blog || "No content returned.";
                    document.getElementById("finalMarkdown").innerText = text;
                    
                    // Show the results div
                    document.getElementById("blogContent").classList.remove("hidden");
                }
            };
        };

        // Connect as soon as page loads
        connectWebSocket();

        // -----------------------------------------------------
        // BUTTON ACTIONS
        // -----------------------------------------------------
        function startBlog() {
            const topic = document.getElementById("topicInput").value;
            if (!topic) {
                alert("Please enter a topic first!");
                return;
            }

            // UI Updates
            document.getElementById("planCard").classList.remove("hidden");
            document.getElementById("planContent").classList.add("hidden");
            document.getElementById("planLoading").classList.remove("hidden");
            document.getElementById("planLoadingText").innerText = "Orchestrator is researching and planning...";
            document.getElementById("blogCard").classList.add("hidden");

            // Send via WebSocket
            ws.send(JSON.stringify({ action: "start", topic: topic }));
        }

        function declinePlan() {
            // UI Updates
            document.getElementById("approveBtn").disabled = true;
            document.getElementById("declineBtn").disabled = true;
            document.getElementById("planContent").classList.add("hidden");
            document.getElementById("planLoading").classList.remove("hidden");
            document.getElementById("planLoadingText").innerText = "Declined. Orchestrator is generating a NEW plan...";

            // Send via WebSocket
            ws.send(JSON.stringify({ action: "decline" }));
        }

        function approvePlan() {
            // UI Updates
            document.getElementById("approveBtn").disabled = true;
            document.getElementById("declineBtn").disabled = true;
            document.getElementById("blogCard").classList.remove("hidden");
            document.getElementById("blogContent").classList.add("hidden");
            document.getElementById("blogLoading").classList.remove("hidden");

            // Scroll down a bit
            document.getElementById("blogCard").scrollIntoView({ behavior: 'smooth' });

            // Send via WebSocket
            ws.send(JSON.stringify({ action: "approve" }));
        }
    </script>
</body>
</html>
